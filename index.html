<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Club Manager 2026</title>

<!-- CONTROL DE CACHE -->
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    background: #fff;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

h1 {
    margin: 0 0 20px 0;
    color: #2c3e50;
}

.form-group {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

.input-labels {
    display: flex;
    gap: 10px;
    margin-bottom: 5px;
}

.input-labels label {
    display: block;
    font-size: 0.4em; /* letra más chica */
    font-weight: bold;
    text-align: left; /* alineado a la izquierda */
}

.input-wrapper {
    display: flex;
    flex-direction: column;
    flex: 1;
}

input, select {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 0.9em;
}

button {
    padding: 10px 20px;
    border: none;
    background: #2c7be5;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #1a5fd1;
}

.card {
    margin-top: 20px;
    padding: 20px;
    border-radius: 8px;
    background: #f9fafb;
    border: 1px solid #eee;
    font-size: 0.9em; /* letra más chica */
}

.card-row {
    display: flex;
    gap: 20px;
    margin-bottom: 6px;
}

.card-row div {
    flex: 1;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

th {
    background: #2c3e50;
    color: white;
    padding: 10px;
    text-align: left;
}

td {
    padding: 10px;
    border-bottom: 1px solid #eee;
}

.total {
    margin-top: 20px;
    font-weight: bold;
    text-align: right;
}

.total.ok { color: green; }
.total.alerta { color: red; }

.error {
    color: red;
    margin-top: 15px;
}

.btn-wsp {
    margin-top: 15px;
    display: inline-block;
}
</style>
</head>

<body>

<div class="container">

    <h1 id="titulo">Club Manager 2026</h1>

    <div class="form-group">
        <div class="input-wrapper">
            <label for="club">Club</label>
            <select id="club"></select>
        </div>
        <div class="input-wrapper">
            <label for="email">Email</label>
            <input type="text" id="email" placeholder="Email">
        </div>
        <div class="input-wrapper">
            <label for="cod">Cod. Grupo Familiar</label>
            <input type="text" id="cod" placeholder="Código de Familia">
        </div>
        <button onclick="buscar()">Consultar</button>
    </div>

    <div id="resultado"></div>

</div>

<script>
const VERSION = "1.0.0";

function mostrar(label, valor) {
    if (valor === undefined || valor === null || String(valor).trim() === "") return "";
    return `<div><b>${label}:</b> ${valor}</div>`;
}

// CARGAR CLUBES
fetch("clubes.json?v=" + VERSION + "&t=" + Date.now(), { cache: "no-store" })
.then(r => r.json())
.then(d => {
    let select = document.getElementById("club");
    select.innerHTML = "<option value=''>Seleccionar club</option>";
    d.clubes.forEach(c => {
        let opt = document.createElement("option");
        opt.value = c.archivo;
        opt.textContent = c.nombre;
        select.appendChild(opt);
    });
})
.catch(() => {
    document.getElementById("resultado").innerHTML =
        "<div class='error'>Error al cargar la lista de clubes.</div>";
});

// BUSCAR
function buscar() {
    let archivo = document.getElementById("club").value;
    let email = document.getElementById("email").value.toLowerCase().trim();
    let cod = document.getElementById("cod").value.trim();

    if (!archivo || !email || !cod) {
        document.getElementById("resultado").innerHTML =
            "<div class='error'>Debe completar todos los campos: club, email y código de familia.</div>";
        return;
    }

    fetch(archivo + "?v=" + VERSION + "&t=" + Date.now(), { cache: "no-store" })
    .then(r => r.json())
    .then(data => {

        let familia = data.familias.find(f =>
            f.email.toLowerCase().trim() === email &&
            String(f.cod_familia).trim() === cod
        );

        if (!familia) {
            document.getElementById("resultado").innerHTML =
                "<div class='error'>No se encontraron datos. Verifique club, email y código del grupo familiar.</div>";
            return;
        }

        document.getElementById("titulo").innerText =
            "Club Manager 2026 - " + data.club.nombre;

        let html = `<div class="card">`;

        // Línea 1: Grupo y Titular
        html += `<div class="card-row">${mostrar("Grupo", familia.nombre)}${mostrar("Titular", familia.titular)}</div>`;
        // Línea 2: Tutor 1 y Teléfono Principal
        html += `<div class="card-row">${mostrar("Tutor 1", familia.NOMBRE_TUTOR_1)}${mostrar("Teléfono", familia.TELEFONO_PRINCIPAL)}</div>`;
        // Línea 3: Tutor 2 y Teléfono Secundario
        html += `<div class="card-row">${mostrar("Tutor 2", familia.NOMBRE_TUTOR_2)}${mostrar("Teléfono Secundario", familia.TELEFONO_SECUNDARIO)}</div>`;

        // Observaciones (si hay)
        if(familia.OBSERVACIONES) html += `<div class="card-row">${mostrar("Obs", familia.OBSERVACIONES)}</div>`;

        // Tabla de integrantes
        html += `<table>
                    <tr>
                        <th>Socio</th>
                        <th>División</th>
                        <th>Deuda</th>
                    </tr>`;
        familia.integrantes.forEach(i => {
            html += `<tr>
                        <td>${i.nombre}</td>
                        <td>${i.division}</td>
                        <td>$${Number(i.deuda).toLocaleString()}</td>
                     </tr>`;
        });
        html += `</table>`;

        let limite = Number(familia.SALDO_LIMITE || 0);
        let total = Number(familia.deuda_total || 0);
        let clase = total > limite ? "alerta" : "ok";

        html += `<div class="total ${clase}">Total: $${total.toLocaleString()}</div>`;

        // WhatsApp
        if (data.club.whatsapp) {
            let mensaje = encodeURIComponent(
                "Hola, soy el tutor del grupo " + familia.cod_familia +
                " - " + familia.nombre +
                ". Me comunico para consultar sobre la cuenta corriente."
            );
            html += `<a class="btn-wsp" target="_blank"
                        href="https://wa.me/${data.club.whatsapp}?text=${mensaje}">
                        <img src="https://cdn-icons-png.flaticon.com/24/733/733585.png">
                     </a>`;
        }

        html += `</div>`;
        document.getElementById("resultado").innerHTML = html;

    })
    .catch(() => {
        document.getElementById("resultado").innerHTML =
            "<div class='error'>Error al cargar los datos del club.</div>";
    });
}
</script>

</body>
</html>
